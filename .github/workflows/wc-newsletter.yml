name: WC 2026 Daily Newsletter

on:
  schedule:
    # 8am SGT = 00:00 UTC
    - cron: "0 0 * * *"
    # 1pm SGT = 05:00 UTC
    - cron: "0 5 * * *"
  workflow_dispatch: # allow manual trigger

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to commit updated bracket.html

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run newsletter
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM: ${{ secrets.TWILIO_WHATSAPP_FROM }}
          TWILIO_WHATSAPP_TO: ${{ secrets.TWILIO_WHATSAPP_TO }}
          SPORTRADAR_API_KEY: ${{ secrets.SPORTRADAR_API_KEY }}
          BRACKET_URL: ${{ secrets.BRACKET_URL }}
        run: node src/newsletter.js

      - name: Commit updated bracket.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/bracket.html
          git diff --staged --quiet || git commit -m "chore: update bracket [skip ci]"
          git push
